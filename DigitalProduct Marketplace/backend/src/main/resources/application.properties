spring.application.name=backend
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/select_marketplace
spring.datasource.username=root
spring.datasource.password=YOUR_SQL_PASSWORD

# Hibernate (Auto-creates tables if they don't exist)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Limits (Important for ZIP files)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
razorpay.key.id=YOUR_RAZORPAY_KEY_HERE
razorpay.key.secret=YOUR_RAZORPAY_SECRET_HERE